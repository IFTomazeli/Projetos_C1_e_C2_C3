<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classificador de Gatos e Cachorros</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Reconhecimento de Imagens 🐱🐶</h1>
        <p>Faça o upload de uma imagem para descobrir se é um gato ou um cachorro.</p>
        
        <div id="status">Carregando modelo da Inteligência Artificial...</div>

        <input type="file" id="imageUpload" accept="image/*" disabled>
        
        <div class="image-container">
            <img id="imagePreview" style="display: none;" alt="Pré-visualização da imagem">
        </div>

        <div id="label-container" class="results"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
